/* --- PREMIUM BULLETPROOF RESET --- */  
*{margin:0;padding:0;box-sizing:border-box;}  
html, body {
  width: 100%;
  overflow-x: hidden; 
  background-color: #020202; 
  font-family: 'Inter', sans-serif;  
  color: #ffffff;  
  -webkit-font-smoothing: antialiased;
}

/* --- 🌟 ALIVE DYNAMIC BACKGROUND 🌟 --- */
.alive-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: -2;
  overflow: hidden;
  background-color: #030303;
}
.orb-1, .orb-2 {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
  animation: floatLights infinite alternate ease-in-out;
}
/* Deep Red Light */
.orb-1 {
  top: -10%; left: -20%; width: 300px; height: 300px;
  background: #8a0303;
  animation-duration: 15s;
}
/* Dark Purple Light */
.orb-2 {
  bottom: -10%; right: -20%; width: 250px; height: 250px;
  background: #2a0845;
  animation-duration: 20s;
  animation-delay: -5s;
}
@keyframes floatLights {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, 40px) scale(1.3); }
}

/* --- MAIN CONTAINER --- */  
.container{  
  max-width:480px; 
  margin: 50px auto; /* Centered perfectly */
  padding: 0 20px; 
  width: 100%; 
  position: relative; 
  z-index: 1;
  animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  opacity: 0; 
  transform: translateY(20px);
}  
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* --- HERO & SPINNING PROFILE --- */  
.hero{ display:flex; flex-direction: column; align-items:center; margin-bottom:35px; }  

.profile-wrapper {
  position: relative; 
  padding: 4px; 
  border-radius: 50%; 
  margin-bottom: 20px;
  background: linear-gradient(145deg, #444, #050505);
  box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 30px rgba(138, 3, 3, 0.2);
}

.spin-pic {
  width: 130px; 
  height: 130px; 
  border-radius: 50%; 
  object-fit: cover;
  border: 3px solid #0a0a0a;
  display: block;
  animation: spinRecord 10s linear infinite;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}
@keyframes spinRecord { 100% { transform: rotate(360deg); } }
  
/* --- TYPOGRAPHY --- */  
.name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
h1{  
  font-family:'Orbitron', sans-serif; font-size: 38px; letter-spacing: 4px; font-weight: 900; 
  text-transform: uppercase; margin: 0; color: #fff;
  background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 70%, #666666 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 15px rgba(0,0,0,1));
}  
.verified { 
  color: #1DA1F2; font-size: 18px; 
  filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.5)); 
}
.tagline{  
  color:#888; font-size:12px; margin-top: 8px; letter-spacing:4px; font-weight: 600; 
  text-transform: uppercase; text-align: center;
}  

/* --- SECTION TITLES WITH EQUALIZERS --- */  
.section-title{  
  margin:35px 0 15px; font-size:11px; color:#777; letter-spacing:4px; 
  text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 12px;
}  
.section-title::after{ content:""; flex-grow: 1; height: 1px; background: rgba(255,255,255,0.08); }

.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { width: 3px; background: #888; animation: eqPlay 0.7s infinite ease-in-out alternate; border-radius: 1px 1px 0 0;}
.bar:nth-child(2) { animation-delay: -0.2s; height: 8px; background: #fff;}
.bar:nth-child(3) { animation-delay: -0.4s; height: 6px; }
@keyframes eqPlay { 0% { height: 4px; } 100% { height: 12px; } }
  
/* --- ULTRA-PREMIUM GLASS BUTTONS --- */  
.links-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.link-btn{  
  display:flex; align-items:center; justify-content:space-between; 
  padding:16px 20px; border-radius:12px; text-decoration:none; color:#ffffff; 
  background: rgba(25, 25, 25, 0.6); 
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.12); 
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: all 0.3s ease; width: 100%;
}  
.link-left { display: flex; align-items: center; gap: 16px; font-size:14px; font-weight:600; color: #ddd;}
.link-btn i.brand-icon { font-size:20px; width:24px; text-align: center; color: #888; transition: all 0.3s ease; }  
.link-btn i.arrow-icon { font-size: 13px; color: #555; transition: all 0.3s ease; }

/* Premium Hover States */
.link-btn:hover { 
  background: rgba(35, 35, 35, 0.8);
  border-top: 1px solid rgba(255,255,255,0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.8);
}
.link-btn:hover .link-left { color: #fff; }
.link-btn:hover i.brand-icon { transform: scale(1.1); filter: drop-shadow(0 0 10px currentColor); }
.link-btn:hover i.arrow-icon { color: #ccc; transform: translateX(5px); }

/* Brand Colors on Hover */
.link-btn:hover .fa-spotify { color: #1DB954; }
.link-btn:hover .fa-youtube { color: #FF0000; }
.link-btn:hover .fa-apple { color: #ffffff; }
.link-btn:hover .fa-amazon { color: #FF9900; }
.link-btn:hover .fa-music { color: #2BC5B4; }
.link-btn:hover .fa-deezer { color: #EF5466; }
.link-btn:hover .fa-wave-square { color: #ffffff; }
.link-btn:hover .fa-play { color: #FFA200; }
.link-btn:hover .fa-soundcloud { color: #FF5500; }
.link-btn:hover .fa-bolt { color: #0088FF; }
.link-btn:hover .fa-instagram { color: #E1306C; }
.link-btn:hover .fa-twitter { color: #1DA1F2; }
.link-btn:hover .fa-facebook-f { color: #1877F2; }
.link-btn:hover .fa-envelope { color: #ffffff; }

/* Footer */  
.footer{ 
  margin-top:40px; font-size:10px; color:#555; letter-spacing:2px; 
  text-align:center; padding-bottom: 30px; font-weight: 600; text-transform: uppercase; 
}  
.footer span { color: #888; font-family: 'Orbitron', sans-serif; letter-spacing: 3px;}
  
/* --- 📱 STRICT MOBILE OPTIMIZATIONS --- */  
@media(max-width:480px){  
  .container { margin: 30px auto; padding: 0 15px; }
  .hero { margin-bottom: 25px; }
  .spin-pic { width: 110px; height: 110px; }

  .tagline { font-size: 11px; letter-spacing: 3px; }
  
  .section-title { margin: 25px 0 12px; }
  
  .link-btn { padding: 15px 16px; border-radius: 12px; } 
  .link-left { font-size: 13px; gap: 14px; }
  .link-btn i.brand-icon { font-size: 18px; width: 20px; }
}  
</style>
