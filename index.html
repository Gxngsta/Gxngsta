    <style>  
    /* --- PURE PREMIUM RESET --- */  
    :root {
      --bg-color: #030303;
      --card-bg: rgba(20, 20, 20, 0.4);
      --card-border: rgba(255, 255, 255, 0.06);
    }
    *{margin:0;padding:0;box-sizing:border-box;}  
    html, body { width: 100%; overflow-x: hidden; }
    html{ scroll-behavior: smooth; }  
    body{  
      font-family: 'Inter', sans-serif;  
      background-color: var(--bg-color);  
      color: #ffffff;  
      position: relative;  
      -webkit-font-smoothing: antialiased;
    }  

    /* --- VIBE OVERLAY (CRT EFFECT) --- */
    body::after {
      content: " ";
      position: fixed; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
      z-index: 9999; background-size: 100% 3px, 3px 100%;
      pointer-events: none; opacity: 0.3;
    }
      
    /* --- PRELOADER --- */
    #preloader {
      position: fixed; inset: 0; width: 100vw; height: 100vh;
      background: var(--bg-color); z-index: 999999; 
      display: flex; justify-content: center; align-items: center; flex-direction: column;
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .preloader-avatar {
      position: relative; padding: 4px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8));
      animation: preloaderBreathe 1s infinite alternate ease-in-out;
    }

    @keyframes preloaderBreathe {
      0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(255,0,79,0.3); }
      100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(0,240,255,0.7); }
    }

    .preloader-cd { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #050505; overflow: hidden; position: relative; }
    .preloader-cd img { width: 100%; height: 100%; object-fit: cover; animation: spinImage 4s linear infinite; }
      
    /* --- BG EFFECTS --- */  
    body::before{  
      content:""; position:fixed; top:0; left:0; width:100vw; height:100vh;  
      background: 
        radial-gradient(circle at 15% 50%, rgba(220, 20, 60, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(0, 200, 255, 0.06), transparent 40%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E"); 
      z-index:-1; pointer-events: none;
    }  

    .container{ max-width:500px; margin:40px auto; padding:0 20px; width:100%; position: relative; z-index: 1; }  
      
    /* --- HERO --- */  
    .hero{ display:flex; flex-direction: column; justify-content:center; align-items:center; margin-bottom:30px; }  
    .cd-player-base {
      position: relative; padding: 4px; border-radius: 50%; margin-bottom: 20px;
      background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8));
    }
    .cd-record { width: 130px; height: 130px; border-radius: 50%; position: relative; border: 3px solid #050505; overflow: hidden; }
    .spin-pic { width: 100%; height: 100%; object-fit: cover; animation: spinImage 10s linear infinite; }  
    @keyframes spinImage { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
    .name-container { display: flex; align-items: center; gap: 8px; }
    h1{ font-family:'Orbitron',sans-serif; font-size: 32px; letter-spacing: 5px; font-weight:900; color: #ffffff; text-transform: uppercase; }  
    .verified { color: #1DA1F2; font-size: 18px; filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.6)); }
    .tagline{ color:#999; font-size:12px; margin-top: 5px; letter-spacing:5px; text-transform: uppercase; }  
      
    /* --- ELEMENTS --- */  
    .section-title{ margin:45px 0 15px; font-size:11px; color:#888; letter-spacing:4px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 12px; }  
    .section-title::after{ content:""; flex-grow: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }  

    .equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
    .bar { width: 3px; height: 12px; background: #666; border-radius: 3px 3px 0 0; animation: eqPlay var(--eq-speed, 0.8s) infinite alternate ease-in-out; }
    @keyframes eqPlay { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(var(--eq-max, 1)); } }
      
    /* --- BUTTONS --- */  
    .links-grid { display: flex; flex-direction: column; gap: 14px; perspective: 1000px; }
    .link-btn{  
      display:flex; align-items:center; justify-content:space-between; 
      padding:18px 20px; border-radius:16px; text-decoration:none; color:#ffffff; 
      background: var(--card-bg); border: 1px solid var(--card-border);  
      backdrop-filter: blur(20px); transition: all 0.3s ease; position: relative; overflow: hidden;
    }  

    .link-btn::after {
      content: ""; position: absolute; inset: 0; border-radius: inherit;
      border: 1px solid var(--brand-color);
      box-shadow: 0 0 15px var(--brand-color), inset 0 0 10px var(--brand-color);
      opacity: 0; transition: opacity 0.3s ease;
    }
    .link-btn:hover::after { opacity: 0.6; }

    .link-left { display: flex; align-items: center; gap: 16px; font-size:15px; font-weight:700; z-index: 2; }
    .brand-icon { font-size: 20px; width: 26px; transition: 0.3s; color: var(--brand-color); }
    .arrow-icon { font-size: 14px; opacity: 0.5; transition: 0.3s; }
    .link-btn:hover .arrow-icon { transform: translateX(5px) rotate(-45deg); opacity: 1; }

    .footer{ margin-top:50px; font-size:11px; color:#555; text-align:center; padding:30px 0; letter-spacing:2px; }
    .footer span { color: #fff; font-family: 'Orbitron'; }

    .reveal-item { opacity: 0; transform: translateY(20px); transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal-item.visible { opacity: 1; transform: translateY(0); }
    </style>  
</head>  
<body>  

<div id="preloader">
  <div class="preloader-avatar">

    Streaming Platforms

  <div class="links-grid">

    <a class="link-btn reveal-item" href="https://youtube.com/@GxngstaOfficial" target="_blank" style="--brand-color: #FF0000;">

      <i class="fas fa-arrow-right arrow-icon"></i>
    </a>
    <a class="link-btn reveal-item" href="https://www.instagram.com/gxngstaofficial" target="_blank" style="--brand-color: #E1306C;">
      <div class="link-left"><i class="fab fa-instagram brand-icon"></i> Instagram</div>
      <i class="fas fa-arrow-right arrow-icon"></i>
    </a> 
    <!-- ADD OTHER LINKS SIMILARLY -->
  </div>

  <div class="footer reveal-item">  
    © <script>document.write(new Date().getFullYear())</script> <span>GXNGSTA</span> <br> ALL RIGHTS RESERVED  
  </div>  
</div>  

<script>
  // 1. PRELOADER & REVEAL
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('preloader').style.opacity = '0';
      document.querySelectorAll('.reveal-item').forEach((item, i) => {
        setTimeout(() => item.classList.add('visible'), i * 100 + 200);
      });
      setTimeout(() => document.getElementById('preloader').style.display = 'none', 800);
    }, 1000);
  });

  // 2. HAPTIC FEEDBACK FOR MOBILE
  document.querySelectorAll('.link-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (navigator.vibrate) navigator.vibrate(15);
    });
  });

  // 3. DYNAMIC SCROLL EQUALIZER
  let scrollTimeout;
  window.addEventListener('scroll', () => {
    document.documentElement.style.setProperty('--eq-speed', '0.2s');
    document.documentElement.style.setProperty('--eq-max', '1.6');
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      document.documentElement.style.setProperty('--eq-speed', '0.8s');
      document.documentElement.style.setProperty('--eq-max', '1');
    }, 150);
  });
</script>
</body>  
</html>
