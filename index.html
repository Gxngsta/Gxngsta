/* --- PURE PREMIUM RESET --- */

/* --- 🌌 CLEAN SPARKS BACKGROUND 🌌 --- */
.ambient-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; background: var(--bg-color); }
.spark { position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%; box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.4); opacity: 0; animation: floatUp var(--speed) ease-in infinite; will-change: transform, opacity; }

body::before{ content:""; position:fixed; top:0; left:0; width:100vw; height:100vh; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E"); z-index:-1; pointer-events: none; }  

/* --- 🌟 PRELOADER (LIQUID MELT TRANSITION) 🌟 --- */
#preloader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 999999; display: flex; justify-content: center; align-items: center; transition: opacity 1s ease-in-out; will-change: opacity; }

.preloader-cd { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #050505; overflow: hidden; position: relative; }
.preloader-cd img { width: 100%; height: 100%; object-fit: cover; display: block; animation: spinImage 4s linear infinite; }
.preloader-cd::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(rgba(255,255,255,0.05) 0deg, transparent 45deg, rgba(255,255,255,0.15) 90deg, transparent 135deg, rgba(255,255,255,0.05) 180deg, transparent 225deg, rgba(255,255,255,0.15) 270deg, transparent 315deg, rgba(255,255,255,0.05) 360deg); z-index: 5; pointer-events: none; mix-blend-mode: overlay; }

#preloader.hide-anim { opacity: 0; pointer-events: none; }

/* --- CONTAINER & HERO --- */  
.container{ max-width:500px; margin:40px auto; padding:0 20px; width:100%; position: relative; z-index: 1; }  
.hero{ display:flex; flex-direction: column; justify-content:center; align-items:center; margin-bottom:30px; perspective: 1000px; }  
.cd-player-base { position: relative; padding: 4px; border-radius: 50%; margin-bottom: 20px; background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8)); box-shadow: 0 0 40px rgba(255,0,79,0.15), 0 0 40px rgba(0,240,255,0.15); animation: liquidAura 4s ease-in-out infinite alternate; will-change: transform; transform-style: preserve-3d; }
.cd-record { width: clamp(110px, 30vw, 130px); height: clamp(110px, 30vw, 130px); border-radius: 50%; position: relative; border: 3px solid #050505; overflow: hidden; transform: translateZ(20px); }
.cd-record::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(rgba(255,255,255,0.05) 0deg, transparent 45deg, rgba(255,255,255,0.15) 90deg, transparent 135deg, rgba(255,255,255,0.05) 180deg, transparent 225deg, rgba(255,255,255,0.15) 270deg, transparent 315deg, rgba(255,255,255,0.05) 360deg); z-index: 5; pointer-events: none; mix-blend-mode: overlay; }
.cd-record::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 40%, transparent 60%, rgba(255,255,255,0.1) 100%); z-index: 10; pointer-events: none; mix-blend-mode: soft-light; border-radius: 50%; }

.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { width: 3px; height: 12px; background: linear-gradient(to top, #00f0ff, #ff004f); border-radius: 3px 3px 0 0; transform-origin: bottom; animation: eqPlay 0.8s infinite alternate ease-in-out; will-change: transform; box-shadow: 0 0 5px rgba(255,0,79,0.5); }

/* 🔥 ULTRA 3D PLAY STORE APP ICON STYLING 🔥 */
.app-icon {
  width: 40px; height: 40px; 
  border-radius: 10px; /* Perfect Play Store / iOS Squarcle */
  display: flex; align-items: center; justify-content: center; 
  font-size: 22px;
  position: relative;
  /* Complex 3D Drop Shadow & Inner Emboss */
  box-shadow: 
    0 4px 8px rgba(0,0,0,0.5),           
    0 8px 16px rgba(0,0,0,0.3),          
    inset 0 2px 2px rgba(255,255,255,0.8), 
    inset 0 -2px 4px rgba(0,0,0,0.3);      
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; 
  flex-shrink: 0;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Glassy Shine Overlay for 3D depth */
.app-icon::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
  pointer-events: none;
  z-index: 1;
}

/* Continuous Shimmer Light Sweep on Icons */
.app-icon::after {
  content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
  transform: rotate(30deg) translateX(-150%);
  animation: shimmerSweep 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  pointer-events: none; z-index: 5;
}
@keyframes shimmerSweep { 0%, 40% { transform: rotate(30deg) translateX(-150%); } 100% { transform: rotate(30deg) translateX(150%); } }

.app-icon i, .app-icon .custom-text-icon, .app-icon svg {

<script>
  // 🛡️ 1. UNBREAKABLE NATIVE JS (No AddEventListeners for Loading) 🛡️
  (function() {
    var preloader = document.getElementById('preloader');
    var items = document.querySelectorAll('.reveal-item');
    var isLoaded = false;

    function killLoader() {
      if(isLoaded) return;
      isLoaded = true;
      
      if(preloader) {
        preloader.classList.add('hide-anim');
        setTimeout(function() {
          preloader.style.display = 'none';
        }, 1000); 
      }
      
      for(var i = 0; i < items.length; i++) {
        (function(index) {
          setTimeout(function() {
            items[index].classList.add('visible');
          }, 200 + (index * 80)); 
        })(i);
      }
    }

    // FIRE EXACTLY AFTER 1.2 SECONDS
    setTimeout(killLoader, 1200);
    
    // Tap to skip
    if(preloader) {
      preloader.onclick = killLoader;
    }
  })();

  // 🌌 2. SPARKS ANIMATION
  try { 
    var sparkContainer = document.getElementById('spark-container'); 
    if(sparkContainer) { 
      for (var j = 0; j < 15; j++) { 
        var spark = document.createElement('div'); 
        spark.classList.add('spark'); 
        spark.style.left = (Math.random() * 100) + 'vw'; 
        spark.style.setProperty('--speed', (Math.random() * 4 + 4) + 's'); 
        spark.style.setProperty('--max-opacity', (Math.random() * 0.4 + 0.1)); 
        spark.style.animationDelay = (Math.random() * 5) + 's'; 
        sparkContainer.appendChild(spark); 
      } 
    } 
  } catch(e) {}

  // 💻 3. 3D EFFECTS (Desktop Only)
  try { 
    if (window.matchMedia("(pointer: fine)").matches) { 
      var btns = document.querySelectorAll('.magnetic-btn');
      for(var k = 0; k < btns.length; k++) {
        btns[k].addEventListener('mousemove', function(e) { 
          var rect = this.getBoundingClientRect(); 
          var x = e.clientX - rect.left; 
          var y = e.clientY - rect.top; 
          this.style.setProperty('--x', x + 'px'); 
          this.style.setProperty('--y', y + 'px'); 
          var centerX = rect.width / 2; 
          var centerY = rect.height / 2; 
          var rotateX = ((y - centerY) / centerY) * -8; 
          var rotateY = ((x - centerX) / centerX) * 8; 
          this.style.transform = 'perspective(1000px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale3d(1.02, 1.02, 1.02)'; 
        }); 
        btns[k].addEventListener('mouseleave', function() { 
          this.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)'; 
        }); 
      }
      
      var hero = document.querySelector('.hero-parallax'); 
      var parallaxItems = document.querySelectorAll('.parallax-item'); 
      if (hero) { 
        document.addEventListener('mousemove', function(e) { 
          requestAnimationFrame(function() { 
            var xAxis = (window.innerWidth / 2 - e.pageX) / 30; 
            var yAxis = (window.innerHeight / 2 - e.pageY) / 30; 
            if(parallaxItems[0]) parallaxItems[0].style.transform = 'rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg)'; 
            if(parallaxItems[1]) parallaxItems[1].style.transform = 'translateZ(30px) rotateY(' + (xAxis*0.4) + 'deg) rotateX(' + (yAxis*0.4) + 'deg)'; 
            if(parallaxItems[2]) parallaxItems[2].style.transform = 'translateZ(10px) rotateY(' + (xAxis*0.2) + 'deg) rotateX(' + (yAxis*0.2) + 'deg)'; 
          }); 
        }); 
      } 
    } 
  } catch(e) {}
</script>
