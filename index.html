<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GXNGSTA | Independent Hip-Hop Artist</title>
<meta name="description" content="GXNGSTA - Independent Hip-Hop Artist. Stream the latest tracks worldwide.">
<meta name="author" content="GXNGSTA">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg-color: #030303;
  --card-bg: rgba(20, 20, 20, 0.4);
  --card-border: rgba(255, 255, 255, 0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
html, body { width: 100%; overflow-x: hidden; }
html{ scroll-behavior: smooth; }
body{
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-color);
  color: #ffffff;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

/* Background */
body::before{
  content:""; position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:
    radial-gradient(circle at 15% 50%, rgba(220, 20, 60, 0.08), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0, 200, 255, 0.06), transparent 40%);
  z-index:-1;
}

/* Container */
.container{
  max-width:500px; margin:40px auto; padding:0 20px; width:100%;
}

/* Hero */
.hero{ display:flex; flex-direction: column; align-items:center; margin-bottom:30px; }

/* CD Base Glow */
.cd-player-base {
  padding: 4px;
  border-radius: 50%;
  margin-bottom: 20px;
  background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8));
  box-shadow: 0 0 40px rgba(255,0,79,0.2), 0 0 40px rgba(0,240,255,0.2);
}

/* ULTRA SMOOTH CD */
.cd-record {
  width: clamp(110px, 30vw, 130px);
  height: clamp(110px, 30vw, 130px);
  border-radius: 50%;
  border: 3px solid #050505;
  overflow: hidden;
  animation: spinRecord 16s linear infinite;
  transform: translate3d(0,0,0);
  backface-visibility: hidden;
  perspective: 1000px;
  will-change: transform;
}

.cd-record img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Reflection */
.cd-record::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(
    rgba(255,255,255,0.05) 0deg,
    transparent 60deg,
    rgba(255,255,255,0.15) 120deg,
    transparent 180deg,
    rgba(255,255,255,0.05) 240deg,
    transparent 300deg
  );
  mix-blend-mode: overlay;
  pointer-events:none;
}

@keyframes spinRecord {
  from { transform: rotate(0deg) translate3d(0,0,0); }
  to   { transform: rotate(360deg) translate3d(0,0,0); }
}

/* Typography */
h1{
  font-family:'Orbitron',sans-serif;
  font-size: clamp(28px, 8vw, 36px);
  letter-spacing: 5px;
  font-weight:900;
  text-transform: uppercase;
}

.tagline{
  color:#999;
  font-size:12px;
  margin-top:5px;
  letter-spacing:4px;
}

/* Links */
.links-grid { display:flex; flex-direction:column; gap:14px; }

.link-btn{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px;
  border-radius:16px;
  text-decoration:none;
  color:#fff;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
}

.link-btn:hover{
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.2);
}

.link-left{ display:flex; align-items:center; gap:16px; font-weight:700; }

.footer{
  margin-top:50px;
  font-size:11px;
  color:#555;
  text-align:center;
}
</style>
</head>

<body>
<div class="container">

<div class="hero">
  <div class="cd-player-base">
    <div class="cd-record">
      <img src="profile.jpg" alt="GXNGSTA">
    </div>
  </div>
  <h1>GXNGSTA</h1>
  <p class="tagline">Independent Hip-Hop Artist</p>
</div>

<div class="links-grid">
  <a class="link-btn" href="https://open.spotify.com/artist/0ysGay6NRI9AGPpKwKXmAb" target="_blank">
    <div class="link-left"><i class="fab fa-spotify"></i> Spotify</div>
    <i class="fas fa-arrow-right"></i>
  </a>
  <a class="link-btn" href="https://youtube.com/@GxngstaOfficial" target="_blank">
    <div class="link-left"><i class="fab fa-youtube"></i> YouTube</div>
    <i class="fas fa-arrow-right"></i>
  </a>
  <a class="link-btn" href="https://www.instagram.com/gxngstaofficial" target="_blank">
    <div class="link-left"><i class="fab fa-instagram"></i> Instagram</div>
    <i class="fas fa-arrow-right"></i>
  </a>
</div>

<div class="footer">
© <script>document.write(new Date().getFullYear())</script> GXNGSTA  
</div>

</div>
</body>
</html>
