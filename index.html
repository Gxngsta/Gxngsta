<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

.background{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center,#111 0%,#000 70%);
  z-index:-1;
}

.container{
  max-width:500px;
  margin:auto;
  padding:30px 20px;
  text-align:center;
}

.cd-wrapper{
  margin:20px auto;
  width:180px;
  height:180px;
  position:relative;
}

.cd{
  width:100%;
  height:100%;
  border-radius:50%;
  background:url('your-album-cover.jpg') center/cover no-repeat;
  animation:spin 8s linear infinite;
  box-shadow:0 0 25px #00f0ff;
}

@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}

h1{
  font-family:'Orbitron',sans-serif;
  font-size:28px;
  margin-top:20px;
  letter-spacing:2px;
}

.tagline{
  font-size:14px;
  color:#aaa;
  margin:10px 0 25px;
}

.link-btn{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  margin:12px 0;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  font-weight:500;
  background:#111;
  border:1px solid #222;
  transition:0.3s ease;
}

.link-btn:hover{
  transform:translateY(-3px);
  background:#1a1a1a;
  box-shadow:0 0 15px #00f0ff;
}

.link-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.brand-icon{
  font-size:18px;
}

.arrow-icon{
  font-size:14px;
  opacity:0.6;
}

footer{
  margin-top:30px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container">

  <div class="cd-wrapper">
    <div class="cd"></div>
  </div>

  <h1>GXNGSTA</h1>
  <div class="tagline">Stream Music Worldwide 🌍</div>

  <a class="link-btn" href="https://open.spotify.com/artist/0ysGay6NRI9AGPpKwKXmAb" target="_blank">
    <div class="link-left"><i class="fab fa-spotify brand-icon"></i> Spotify</div>
    <i class="fas fa-arrow-right arrow-icon"></i>
  </a>

  <a class="link-btn" href="https://music.apple.com/in/artist/gxngsta/1797817041" target="_blank">
    <div class="link-left"><i class="fab fa-apple brand-icon"></i> Apple Music</div>
    <i class="fas fa-arrow-right arrow-icon"></i>
  </a>

  <a class="link-btn" href="https://music.amazon.in/artists/B0DY2VBLFR" target="_blank">
    <div class="link-left"><i class="fab fa-amazon brand-icon"></i> Amazon Music</div>
    <i class="fas fa-arrow-right arrow-icon"></i>
  </a>

  <a class="link-btn" href="https://www.jiosaavn.com/artist/gxngsta-songs/xxxx" target="_blank">
    <div class="link-left"><i class="fas fa-music brand-icon"></i> JioSaavn</div>
    <i class="fas fa-arrow-right arrow-icon"></i>
  </a>

  <a class="link-btn" href="mailto:gxngstaofficial@gmail.com">
    <div class="link-left"><i class="fas fa-envelope brand-icon"></i> Email</div>
    <i class="fas fa-arrow-right arrow-icon"></i>
  </a>

  <footer>
    © 2026 GXNGSTA. All rights reserved.
  </footer>

</div>

</body>
</html>
