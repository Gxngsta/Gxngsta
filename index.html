<style>  
/* --- PREMIUM MINIMAL RESET --- */  
*{margin:0;padding:0;box-sizing:border-box;}  
html, body {
  max-width: 100%; 
  overflow-x: hidden; 
  background-color: #000000; /* Pure Pitch Black */
}
body{  
  font-family:'Inter',sans-serif;  
  color:#ffffff;  
  min-height: 100%;
  position:relative;  
  -webkit-font-smoothing: antialiased;
  display: flex; justify-content: center;
}  

/* --- SUBTLE CINEMATIC GLOW (No distractions) --- */
body::before {
  content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(circle at 50% 15%, rgba(138, 3, 3, 0.15), transparent 50%),
              radial-gradient(circle at 50% 85%, rgba(255, 255, 255, 0.02), transparent 50%);
  z-index: -1; pointer-events: none;
}

/* --- MAIN CONTAINER --- */  
.container{  
  max-width:480px; margin:50px auto; padding: 0 20px; width:100%; position: relative; z-index: 2;
  animation: fadeUp 1s ease-out forwards;
  opacity: 0; transform: translateY(20px);
}  
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* --- HERO & PROFILE --- */  
.hero{ display:flex; flex-direction: column; align-items:center; margin-bottom:40px; }  
.profile-wrapper {
  position: relative; padding: 3px; border-radius: 50%; margin-bottom: 20px;
  background: linear-gradient(180deg, #444, #111);
  box-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 25px rgba(138, 3, 3, 0.2);
}
.hero img{  
  width:120px; height:120px; border-radius:50%; object-fit:cover;  
  border: 4px solid #000; display: block;
}  
  
/* --- TYPOGRAPHY (CLEAN & BOLD) --- */  
.name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
h1{  
  font-family:'Orbitron', sans-serif; font-size: 38px; letter-spacing: 6px; font-weight: 900; 
  text-transform: uppercase; margin: 0; color: #fff;
  background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
}  
.verified { 
  color: #1DA1F2; font-size: 18px; 
  filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.4)); 
}
.tagline{  
  color:#888; font-size:12px; margin-top: 8px; letter-spacing:4px; font-weight: 600; 
  text-transform: uppercase; text-align: center;
}  

/* --- SECTION TITLES --- */  
.section-title{  
  margin:35px 0 15px; font-size:11px; color:#555; letter-spacing:4px; 
  text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 12px;
}  
.section-title::after{ content:""; flex-grow: 1; height: 1px; background: rgba(255,255,255,0.05); }

/* Streaming Equalizer */
.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { width: 3px; background: #555; animation: eqPlay 0.8s infinite ease-in-out alternate; }
.bar:nth-child(2) { animation-delay: -0.2s; height: 8px; }
.bar:nth-child(3) { animation-delay: -0.4s; height: 6px; }
@keyframes eqPlay { 0% { height: 4px; } 100% { height: 12px; } }
  
/* --- FROSTED OBSIDIAN BUTTONS --- */  
.links-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.link-btn{  
  display:flex; align-items:center; justify-content:space-between; 
  padding:16px 20px; border-radius:12px; text-decoration:none; color:#ffffff; 
  background: rgba(20, 20, 20, 0.6); 
  border: 1px solid rgba(255,255,255,0.04);
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  transition: all 0.3s ease; width: 100%;
}  
.link-left { display: flex; align-items: center; gap: 15px; font-size:14px; font-weight:600; }
.link-btn i.brand-icon { font-size:20px; width:22px; text-align: center; color: #888; transition: all 0.3s ease; }  
.link-btn i.arrow-icon { font-size: 12px; color: #333; transition: all 0.3s ease; }

/* Premium Hover States */
.link-btn:hover { 
  background: rgba(30, 30, 30, 0.8); 
  border-color: rgba(255,255,255,0.1); 
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}
.link-btn:hover i.brand-icon { color: #fff; transform: scale(1.05); }
.link-btn:hover i.arrow-icon { color: #888; transform: translateX(4px); }

/* Subtle Brand Colors on Hover */
.link-btn:hover .fa-spotify { color: #1DB954; }
.link-btn:hover .fa-youtube { color: #FF0000; }
.link-btn:hover .fa-instagram { color: #E1306C; }

/* Footer */  
.footer{ 
  margin-top:50px; font-size:10px; color:#444; letter-spacing:2px; 
  text-align:center; padding-bottom: 30px; font-weight: 600; text-transform: uppercase; 
}  
.footer span { color: #666; font-family: 'Orbitron', sans-serif; letter-spacing: 3px;}
  
/* --- 📱 MOBILE OPTIMIZATIONS --- */  
@media(max-width:480px){  
  .container { margin: 30px auto; padding: 0 15px; }
  .hero { margin-bottom: 25px; }
  .hero img { width: 105px; height: 105px; }

  .tagline { font-size: 11px; letter-spacing: 3px; }
  .section-title { margin: 25px 0 12px; }
  .link-btn { padding: 15px 18px; border-radius: 10px; } 
  .link-left { font-size: 13px; gap: 14px; }
  .link-btn i.brand-icon { font-size: 18px; width: 20px; }
}  
</style>
