<style>  
/* --- PREMIUM STUDIO RESET --- */  
*{margin:0;padding:0;box-sizing:border-box;}  
html, body {
  max-width: 100%; 
  overflow-x: hidden; 
  background-color: #020202; /* Deep base black */
}
body{  
  font-family:'Inter',sans-serif;  
  color:#ffffff;  
  min-height: 100vh;
  position:relative;  
  -webkit-font-smoothing: antialiased;
  display: flex; justify-content: center;
}  

/* --- 🌟 ALIVE DYNAMIC BACKGROUND (CINEMATIC AURORA) 🌟 --- */
.ambient-bg {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  z-index: -2;
  overflow: hidden;
  background-color: #050505;
}
.ambient-light-1, .ambient-light-2, .ambient-light-3 {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px); /* Massive blur for smooth aura */
  opacity: 0.4;
  animation: floatLights infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
}
/* Deep Red Orb */
.ambient-light-1 {
  top: -10%; left: -20%; width: 70vw; height: 70vw;
  background: radial-gradient(circle, #8a0303, transparent 60%);
  animation-duration: 18s;
}
/* Dark Purple/Blue Orb */
.ambient-light-2 {
  bottom: -20%; right: -10%; width: 60vw; height: 60vw;
  background: radial-gradient(circle, #2a0845, transparent 60%);
  animation-duration: 22s;
  animation-delay: -5s;
}
/* Center Subtle Highlight */
.ambient-light-3 {
  top: 30%; left: 30%; width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(255,255,255,0.03), transparent 60%);
  animation-duration: 15s;
  animation-delay: -10s;
}

@keyframes floatLights {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(5vw, 8vh) scale(1.1); }
  100% { transform: translate(-5vw, -5vh) scale(0.95); }
}

/* Subtle moving noise overlay to make it feel like raw camera film */
.noise-layer {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity: 0.03; pointer-events: none;
  animation: noiseJitter 0.5s steps(2) infinite;
}
@keyframes noiseJitter { 0% { transform: translate(0,0); } 100% { transform: translate(1px, 1px); } }

/* --- MAIN CONTAINER --- */  
.container{  
  max-width:480px; margin:50px auto; padding: 0 20px; width:100%; position: relative; z-index: 2;
  animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  opacity: 0; transform: translateY(30px);
}  
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* --- HERO & SPINNING PROFILE --- */  
.hero{ display:flex; flex-direction: column; align-items:center; margin-bottom:35px; }  

.profile-wrapper {
  position: relative; 
  padding: 4px; 
  border-radius: 50%; 
  margin-bottom: 20px;
  background: linear-gradient(145deg, #444, #050505);
  box-shadow: 0 10px 40px rgba(0,0,0,0.9), 0 0 30px rgba(138, 3, 3, 0.2);
}

.spin-pic {
  width: 135px; 
  height: 135px; 
  border-radius: 50%; 
  object-fit: cover;
  border: 3px solid #0a0a0a;
  display: block;
  animation: spinRecord 12s linear infinite;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}
@keyframes spinRecord { 100% { transform: rotate(360deg); } }
  
/* --- TYPOGRAPHY (HEAVY METAL) --- */  
.name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
h1{  
  font-family:'Orbitron', sans-serif; font-size: 40px; letter-spacing: 5px; font-weight: 900; 
  text-transform: uppercase; margin: 0; color: #fff;
  background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 70%, #666666 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 15px rgba(0,0,0,1));
}  
.verified { 
  color: #1DA1F2; font-size: 18px; 
  filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.5)); 
}
.tagline{  
  color:#888; font-size:12px; margin-top: 8px; letter-spacing:5px; font-weight: 600; 
  text-transform: uppercase; text-align: center;
}  

/* --- SECTION TITLES WITH EQUALIZERS --- */  
.section-title{  
  margin:35px 0 15px; font-size:11px; color:#777; letter-spacing:4px; 
  text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 12px;
}  
.section-title::after{ content:""; flex-grow: 1; height: 1px; background: rgba(255,255,255,0.08); }

.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { width: 3px; background: #888; animation: eqPlay 0.7s infinite ease-in-out alternate; border-radius: 1px 1px 0 0;}
.bar:nth-child(2) { animation-delay: -0.2s; height: 8px; background: #fff;}
.bar:nth-child(3) { animation-delay: -0.4s; height: 6px; }
@keyframes eqPlay { 0% { height: 4px; } 100% { height: 12px; } }
  
/* --- ULTRA-PREMIUM GLASS BUTTONS --- */  
.links-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.link-btn{  
  display:flex; align-items:center; justify-content:space-between; 
  padding:16px 20px; border-radius:14px; text-decoration:none; color:#ffffff; 
  background: rgba(25, 25, 25, 0.5); /* Semi-transparent to let the alive background show */
  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.05);
  border-top: 1px solid rgba(255,255,255,0.15); 
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); width: 100%;
}  
.link-left { display: flex; align-items: center; gap: 16px; font-size:14px; font-weight:600; color: #eee;}
.link-btn i.brand-icon { font-size:20px; width:24px; text-align: center; color: #888; transition: all 0.3s ease; }  
.link-btn i.arrow-icon { font-size: 13px; color: #555; transition: all 0.3s ease; }

/* Premium Hover States */
.link-btn:hover { 
  background: rgba(40, 40, 40, 0.7);
  border-top: 1px solid rgba(255,255,255,0.3);
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.9);
}
.link-btn:hover .link-left { color: #fff; }
.link-btn:hover i.brand-icon { transform: scale(1.1); filter: drop-shadow(0 0 10px currentColor); }
.link-btn:hover i.arrow-icon { color: #ccc; transform: translateX(5px); }

/* Brand Colors on Hover */
.link-btn:hover .fa-spotify { color: #1DB954; }
.link-btn:hover .fa-youtube { color: #FF0000; }
.link-btn:hover .fa-apple { color: #ffffff; }
.link-btn:hover .fa-amazon { color: #FF9900; }

.link-btn:hover .fa-deezer { color: #EF5466; }
.link-btn:hover .fa-wave-square { color: #ffffff; }
.link-btn:hover .fa-play { color: #FFA200; }
.link-btn:hover .fa-soundcloud { color: #FF5500; }
.link-btn:hover .fa-bolt { color: #0088FF; }
.link-btn:hover .fa-instagram { color: #E1306C; }
.link-btn:hover .fa-twitter { color: #1DA1F2; }
.link-btn:hover .fa-facebook-f { color: #1877F2; }
.link-btn:hover .fa-envelope { color: #ffffff; }

/* Footer */  
.footer{ 
  margin-top:50px; font-size:10px; color:#555; letter-spacing:2px; 
  text-align:center; padding-bottom: 30px; font-weight: 600; text-transform: uppercase; 
}  
.footer span { color: #888; font-family: 'Orbitron', sans-serif; letter-spacing: 3px;}
  
/* --- 📱 MOBILE OPTIMIZATIONS --- */  
@media(max-width:480px){  
  .container { margin: 30px auto; padding: 0 18px; }
  .hero { margin-bottom: 25px; }
  .spin-pic { width: 115px; height: 115px; } 
  
  h1 { font-size: 32px; letter-spacing: 4px; } 
  .tagline { font-size: 11px; letter-spacing: 4px; }
  
  .section-title { margin: 25px 0 12px; }
  
  .link-btn { padding: 16px 18px; border-radius: 12px; } 
  .link-left { font-size: 13px; gap: 14px; }
  .link-btn i.brand-icon { font-size: 18px; width: 20px; }
  
  /* Mobile pe orbs thode chhote kar diye taaki fast load ho */
  .ambient-light-1 { width: 100vw; height: 100vw; top: -10%; left: -30%; }
  .ambient-light-2 { width: 90vw; height: 90vw; bottom: -10%; right: -20%; }
}  
</style>
