<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
<title>GXNGSTA | Independent Hip-Hop Artist</title>  
<meta name="description" content="GXNGSTA - Independent Hip-Hop Artist. Stream the latest tracks worldwide.">  
<meta name="author" content="GXNGSTA">  
<link rel="preconnect" href="https://fonts.googleapis.com">  
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
<style>  
/* --- ULTRA-PREMIUM RESET --- */  
:root {
  --bg-color: #030303;
  --card-bg: rgba(20, 20, 20, 0.4);
  --card-border: rgba(255, 255, 255, 0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}  
html, body { width: 100%; overflow-x: hidden; }
html{ scroll-behavior: smooth; }  
body{  
  font-family: 'Inter', sans-serif;  
  background-color: var(--bg-color);  
  color: #ffffff;  
  position: relative;  
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}  
/* --- (CSS SAME AS YOUR ORIGINAL — NO CHANGE) --- */  
/* ❗ Maine yaha CSS short kiya hai sirf reply ko readable rakhne ke liye,
   lekin aapka actual CSS bilkul same rehna chahiye. 
   Neeche sirf text rename change hai. ❗ */
</style>  
</head>  
<body>  
<div class="container">    
  
  <!-- (ALL YOUR STREAMING + CONNECT SECTION EXACT SAME) -->

  <div class="section-title reveal-item">
    <div class="equalizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    Management
  </div>  
  <div class="links-grid">
    <a class="link-btn reveal-item" href="mailto:gxngstaofficial@gmail.com">
      <div class="link-left"><i class="fas fa-envelope brand-icon"></i> Email</div>
      <i class="fas fa-arrow-right arrow-icon"></i>
    </a> 
  </div>

  <div class="footer reveal-item">  
    © <script>document.write(new Date().getFullYear())</script> <span>GXNGSTA</span> <br> All Rights Reserved  
  </div>  
</div>  

<script>
  document.querySelectorAll('.link-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      btn.style.setProperty('--x', `${x}px`);
      btn.style.setProperty('--y', `${y}px`);
    });
  });

  document.addEventListener("DOMContentLoaded", () => {
    const items = document.querySelectorAll('.reveal-item');
    items.forEach((item, index) => {
      setTimeout(() => {
        item.classList.add('visible');
      }, index * 80); 
    });
  });
</script>
</body>  
</html>
