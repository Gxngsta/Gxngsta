<style>  
/* --- ULTRA-PREMIUM RESET --- */  
:root {
  --bg-color: #030303;
  --card-bg: rgba(20, 20, 20, 0.4);
  --card-border: rgba(255, 255, 255, 0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}  
html, body { width: 100%; overflow-x: hidden; }
html{ scroll-behavior: smooth; }  
body{  
  font-family: 'Inter', sans-serif;  
  background-color: var(--bg-color);  
  color: #ffffff;  
  position: relative;  
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}  

/* --- 🌟 VIP PROFILE PRELOADER 🌟 --- */
#preloader {
  position: fixed; inset: 0; background: var(--bg-color); z-index: 99999;
  display: flex; justify-content: center; align-items: center; flex-direction: column;
  transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
}

/* Preloader Glowing Base */
.preloader-avatar {
  position: relative; padding: 4px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8));
  box-shadow: 0 0 40px rgba(255,0,79,0.2), 0 0 40px rgba(0,240,255,0.2);
  animation: preloaderBreathe 1s infinite alternate ease-in-out;
  will-change: transform, box-shadow;
}

/* Preloader Breathing Effect */
@keyframes preloaderBreathe {
  0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(255,0,79,0.3), 0 0 20px rgba(0,240,255,0.3); }
  100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255,0,79,0.7), 0 0 60px rgba(0,240,255,0.7); }
}

/* Preloader CD Structure */
.preloader-cd {
  width: 120px; height: 120px; border-radius: 50%;
  border: 3px solid #050505; overflow: hidden; position: relative;
  transform: translateZ(0);
}
.preloader-cd img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  animation: spinImage 4s linear infinite; /* Faster spin during load */
  will-change: transform;
}
.preloader-cd::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(rgba(255,255,255,0.05) 0deg, transparent 45deg, rgba(255,255,255,0.15) 90deg, transparent 135deg, rgba(255,255,255,0.05) 180deg, transparent 225deg, rgba(255,255,255,0.15) 270deg, transparent 315deg, rgba(255,255,255,0.05) 360deg);
  z-index: 5; pointer-events: none; mix-blend-mode: overlay;
}
  
/* --- CINEMATIC GRAIN & AMBIENT BG --- */  
body::before{  
  content:""; position:fixed; top:0; left:0; width:100vw; height:100vh;  
  background: 
    radial-gradient(circle at 15% 50%, rgba(220, 20, 60, 0.08), transparent 40%),
    radial-gradient(circle at 85% 30%, rgba(0, 200, 255, 0.06), transparent 40%),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E"); 
  z-index:-1; pointer-events: none;
}  

/* --- CONTAINER --- */  
.container{  
  max-width:500px; margin:40px auto; padding:0 20px; width:100%; position: relative; z-index: 1;
}  
  
/* --- HERO SECTION & MAIN CD PLAYER --- */  
.hero{ display:flex; flex-direction: column; justify-content:center; align-items:center; margin-bottom:30px; }  

.cd-player-base {
  position: relative; padding: 4px; border-radius: 50%; margin-bottom: 20px;
  background: linear-gradient(135deg, rgba(255,0,79,0.8), rgba(0,240,255,0.8));
  box-shadow: 0 0 40px rgba(255,0,79,0.15), 0 0 40px rgba(0,240,255,0.15);
  animation: liquidAura 4s ease-in-out infinite alternate;
  will-change: box-shadow, transform;
}
@keyframes liquidAura {
  0% { box-shadow: 0 0 20px rgba(255,0,79,0.1), 0 0 30px rgba(0,240,255,0.1); transform: translateY(0); }
  100% { box-shadow: 0 0 50px rgba(255,0,79,0.3), 0 0 60px rgba(0,240,255,0.2); transform: translateY(-5px); }
}

.cd-record {
  width: clamp(110px, 30vw, 130px); height: clamp(110px, 30vw, 130px);
  border-radius: 50%; position: relative; border: 3px solid #050505;
  overflow: hidden; transform: translateZ(0); 
}

.cd-record::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(rgba(255,255,255,0.05) 0deg, transparent 45deg, rgba(255,255,255,0.15) 90deg, transparent 135deg, rgba(255,255,255,0.05) 180deg, transparent 225deg, rgba(255,255,255,0.15) 270deg, transparent 315deg, rgba(255,255,255,0.05) 360deg);
  z-index: 5; pointer-events: none; mix-blend-mode: overlay;
}

.spin-pic {  
  width: 100%; height: 100%; object-fit: cover; display: block;
  animation: spinImage 10s linear infinite; transform: translateZ(0); will-change: transform;
}  
@keyframes spinImage { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  
/* --- TYPOGRAPHY --- */  
.name-container { display: flex; align-items: center; gap: 8px; }
h1{

  letter-spacing: 5px; font-weight:900; color: #ffffff; text-transform: uppercase;

.verified { color: #1DA1F2; font-size: clamp(16px, 5vw, 20px); filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.6)); }
.tagline{ color:#999; font-size:12px; margin-top: 5px; letter-spacing:5px; font-weight: 600; text-transform: uppercase; }  
  
/* --- SECTION TITLES & DYNAMIC EQUALIZERS --- */  
.section-title{  
  margin:45px 0 15px; font-size:11px; color:#888; letter-spacing:4px;  
  text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 12px;
}  
.section-title::after{ content:""; flex-grow: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }  

.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { 
  width: 3px; height: 12px; background: #666; border-radius: 3px 3px 0 0; 
  transform-origin: bottom; animation: eqPlay var(--eq-speed, 0.8s) infinite alternate ease-in-out; will-change: transform;
}
.bar:nth-child(2) { animation-delay: -0.2s; background: #aaa; }
.bar:nth-child(3) { animation-delay: -0.4s; background: #fff; }
@keyframes eqPlay { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(var(--eq-max, 1)); } }
  
/* --- 3D MAGNETIC BUTTONS --- */  
.links-grid { display: flex; flex-direction: column; gap: 14px; perspective: 1000px; }

.link-btn{  
  display:flex; align-items:center; justify-content:space-between; 
  padding:18px 20px; border-radius:16px; text-decoration:none; color:#ffffff; 
  background: var(--card-bg); border: 1px solid var(--card-border);  
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  position: relative; overflow: hidden;
  transition: transform 0.1s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  transform-style: preserve-3d; will-change: transform;
}  

.link-btn::before {
  content: ""; position: absolute; top: var(--y, 50%); left: var(--x, 50%);
  transform: translate(-50%, -50%); width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 0;
}
.link-btn:hover::before { opacity: 1; }

.link-left { display: flex; align-items: center; gap: 16px; font-size:15px; font-weight:700; z-index: 2; transform: translateZ(20px); }
.link-btn i.arrow-icon { transform: translateZ(20px); z-index: 2; }

/* INTELLIGENT BRAND BLINKING */
.link-btn i.brand-icon {
  font-size: clamp(20px, 6vw, 24px); width:26px; text-align: center;
  animation: brandPulse 4s infinite alternate ease-in-out;
  transition: color 0.3s ease, text-shadow 0.3s ease, transform 0.3s ease;
  will-change: color, text-shadow;
}  

.fa-spotify { --brand-color: #1DB954; }
.fa-apple, .fa-wave-square { --brand-color: #ffffff; }
.fa-youtube { --brand-color: #FF0000; }
.fa-amazon { --brand-color: #FF9900; }
.fa-music { --brand-color: #2BC5B4; }
.fa-deezer { --brand-color: #EF5466; }
.fa-play { --brand-color: #FFA200; }
.fa-soundcloud { --brand-color: #FF5500; }
.fa-bolt { --brand-color: #0088FF; }
.fa-instagram { --brand-color: #E1306C; }
.fa-twitter { --brand-color: #1DA1F2; }
.fa-facebook-f { --brand-color: #1877F2; }
.fa-envelope { --brand-color: #00f0ff; }

@keyframes brandPulse {
  0%, 30% { color: rgba(255,255,255,0.3); text-shadow: 0 0 0px transparent; }
  70%, 100% { color: var(--brand-color); text-shadow: 0 0 12px var(--brand-color); }
}

.links-grid > a:nth-child(even) .brand-icon { animation-delay: 1.5s; }
.links-grid > a:nth-child(3n) .brand-icon { animation-delay: 0.7s; }

.link-btn i.arrow-icon {
  font-size: 14px; color: #555; background: rgba(255,255,255,0.03);
  width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s ease, color 0.3s ease, background 0.3s ease;

/* Hover & Active States */
.link-btn:hover {

.link-btn:active {

  background: rgba(40, 40, 40, 0.6); transition: transform 0.05s ease;

.link-btn:hover i.brand-icon, .link-btn:active i.brand-icon {
  transform: scale(1.15); color: var(--brand-color); animation: none; text-shadow: 0 0 15px var(--brand-color);
}
.link-btn:hover i.arrow-icon, .link-btn:active i.arrow-icon { 
  background: #ffffff; color: #000; transform: rotate(-45deg) translateZ(20px); 
}
  
/* --- FOOTER --- */

<script>
  // 1. VIP Profile Preloader Logic
  window.addEventListener('load', () => {
    // 1.2 seconds of letting the user see the glowing profile pic
    setTimeout(() => {
      const preloader = document.getElementById('preloader');
      preloader.style.opacity = '0';
      preloader.style.visibility = 'hidden';
      
      // Trigger staggered reveal exactly when the preloader starts fading
      const items = document.querySelectorAll('.reveal-item');
      items.forEach((item, index) => {
        setTimeout(() => { item.classList.add('visible'); }, index * 80); 
      });
    }, 1200); 
  });

  // 2. 3D Magnetic Tilt & Mouse Spotlight Logic
  document.querySelectorAll('.magnetic-btn').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      btn.style.setProperty('--x', `${x}px`);
      btn.style.setProperty('--y', `${y}px`);

      if (window.innerWidth > 768) {
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -10; 
        const rotateY = ((x - centerX) / centerX) * 10;
        btn.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
      }
    });

    btn.addEventListener('mouseleave', () => {
      btn.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
    });
  });

  // 3. Dynamic Audio Waveform on Scroll
  let scrollTimeout;
  window.addEventListener('scroll', () => {
    document.documentElement.style.setProperty('--eq-speed', '0.2s');
    document.documentElement.style.setProperty('--eq-max', '1.5'); 
    
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      document.documentElement.style.setProperty('--eq-speed', '0.8s');
      document.documentElement.style.setProperty('--eq-max', '1');
    }, 150); 
  });
</script>
