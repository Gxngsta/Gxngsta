<style>  
/* --- PREMIUM BULLETPROOF RESET --- */  
*{margin:0;padding:0;box-sizing:border-box;}  
html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden; /* Prevents horizontal scroll */
  background-color: #020103; /* Very deep base tone */
  font-family: 'Inter', sans-serif;  
  color: #ffffff;  
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* --- 🌌 ULTRA-CINEMATIC 3D ALIVE BACKGROUND 🌌 --- */
.cinematic-bg-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -3; overflow: hidden; pointer-events: none;
  background: #030205;
}

/* Layer 1: Slowly Rotating Nebula Mesh */
.bg-mesh-rotate {
  position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
  background: radial-gradient(ellipse at center, rgba(40, 0, 60, 0.2) 0%, transparent 70%);
  filter: blur(100px);
  animation: rotateMesh 80s linear infinite;
  opacity: 0.7;
}
@keyframes rotateMesh { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Layer 2: Floating Plasma Light (Red/Orange) */
.bg-plasma-1 {
  position: absolute; top: 20%; left: 10%; width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(255, 50, 50, 0.15), transparent 60%);
  filter: blur(80px); border-radius: 50%;
  animation: floatPlasma1 25s ease-in-out infinite alternate;
  mix-blend-mode: screen; /* Makes light feel real */
}
@keyframes floatPlasma1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(20%, 30%) scale(1.2); } }

/* Layer 3: Floating Plasma Light (Cyan/Deep Blue) */
.bg-plasma-2 {
  position: absolute; bottom: 10%; right: 10%; width: 70vw; height: 70vw;
  background: radial-gradient(circle, rgba(0, 150, 255, 0.12), transparent 60%);
  filter: blur(100px); border-radius: 50%;
  animation: floatPlasma2 30s ease-in-out infinite alternate;
  mix-blend-mode: screen;
}
@keyframes floatPlasma2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-20%, -20%) scale(1.1); } }


/* --- MAIN CONTAINER --- */  
.container{  
  max-width:480px; margin: 50px auto; padding: 0 20px; width: 100%; position: relative; z-index: 1;
  animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  opacity: 0; transform: translateY(20px);
}  
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

/* --- HERO & SPINNING PROFILE --- */  
.hero{ display:flex; flex-direction: column; align-items:center; margin-bottom:35px; }  

.profile-wrapper {
  position: relative; padding: 4px; border-radius: 50%; margin-bottom: 20px;
  /* Background reflects the environment */
  background: linear-gradient(145deg, rgba(60,60,60,0.5), rgba(5,5,5,0.8));
  box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
  backdrop-filter: blur(5px);
}

.spin-pic {
  width: 130px; height: 130px; border-radius: 50%; object-fit: cover;
  border: 3px solid #0a0a0a; display: block;
  animation: spinRecord 10s linear infinite;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
}
@keyframes spinRecord { 100% { transform: rotate(360deg); } }
  
/* --- TYPOGRAPHY --- */  
.name-container { display: flex; align-items: center; justify-content: center; gap: 8px; }
h1{  
  font-family:'Orbitron', sans-serif; font-size: 38px; letter-spacing: 4px; font-weight: 900; 
  text-transform: uppercase; margin: 0; color: #fff;
  /* Chrome texture text */
  background: linear-gradient(180deg, #ffffff 20%, #a0a0a0 50%, #444 51%, #888 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 15px rgba(0,0,0,0.9));
}  
.verified { 
  color: #1DA1F2; font-size: 18px; 
  filter: drop-shadow(0 0 10px rgba(29, 161, 242, 0.6)); 
}
.tagline{  
  color:#888; font-size:12px; margin-top: 8px; letter-spacing:4px; font-weight: 600; 
  text-transform: uppercase; text-align: center; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}  

/* --- SECTION TITLES WITH EQUALIZERS --- */  
.section-title{  
  margin:35px 0 15px; font-size:11px; color:#777; letter-spacing:4px; 
  text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 12px;
}  
.section-title::after{ content:""; flex-grow: 1; height: 1px; background: rgba(255,255,255,0.1); box-shadow: 0 0 5px rgba(255,255,255,0.1); }

.equalizer { display: flex; gap: 3px; height: 12px; align-items: flex-end; }
.bar { width: 3px; background: #999; animation: eqPlay 0.7s infinite ease-in-out alternate; border-radius: 1px 1px 0 0; box-shadow: 0 0 5px rgba(255,255,255,0.2);}
.bar:nth-child(2) { animation-delay: -0.2s; height: 8px; background: #fff;}
.bar:nth-child(3) { animation-delay: -0.4s; height: 6px; }
@keyframes eqPlay { 0% { height: 4px; } 100% { height: 12px; } }
  
/* --- ULTRA-PREMIUM 3D GLASS BUTTONS --- */  
.links-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
.link-btn{  
  display:flex; align-items:center; justify-content:space-between; 
  padding:16px 20px; border-radius:14px; text-decoration:none; color:#ffffff; 
  /* Highly transparent glass to let the 3D BG show through */
  background: rgba(20, 20, 25, 0.5); 
  backdrop-filter: blur(15px) saturate(120%); -webkit-backdrop-filter: blur(15px) saturate(120%);
  border: 1px solid rgba(255,255,255,0.08);
  border-top: 1px solid rgba(255,255,255,0.2); /* Strong top reflection */
  border-bottom: 1px solid rgba(0,0,0,0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.02);
  transition: all 0.3s ease; width: 100%;
}  
.link-left { display: flex; align-items: center; gap: 16px; font-size:14px; font-weight:600; color: #ddd; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
.link-btn i.brand-icon { font-size:20px; width:24px; text-align: center; color: #888; transition: all 0.3s ease; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));}  
.link-btn i.arrow-icon { font-size: 13px; color: #555; transition: all 0.3s ease; }

/* Premium Hover States */
.link-btn:hover { 
  background: rgba(30, 30, 35, 0.65);
  border-top: 1px solid rgba(255,255,255,0.3);
  transform: translateY(-3px) scale(1.01);
  box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.05);
}
.link-btn:hover .link-left { color: #fff; }
.link-btn:hover i.brand-icon { transform: scale(1.1); filter: drop-shadow(0 0 12px currentColor); }
.link-btn:hover i.arrow-icon { color: #ccc; transform: translateX(5px); }

/* Brand Colors on Hover */
.link-btn:hover .fa-spotify { color: #1DB954; }
.link-btn:hover .fa-youtube { color: #FF0000; }
.link-btn:hover .fa-apple { color: #ffffff; }
.link-btn:hover .fa-amazon { color: #FF9900; }

.link-btn:hover .fa-play { color: #FFA200; }

.link-btn:hover .fa-twitter { color: #1DA1F2; }
.link-btn:hover .fa-facebook-f { color: #1877F2; }
.link-btn:hover .fa-envelope { color: #ffffff; }

/* Footer */  
.footer{ 
  margin-top:40px; font-size:10px; color:#555; letter-spacing:2px; 
  text-align:center; padding-bottom: 30px; font-weight: 600; text-transform: uppercase; 
}  
.footer span { color: #888; font-family: 'Orbitron', sans-serif; letter-spacing: 3px;}
  
/* --- 📱 STRICT MOBILE OPTIMIZATIONS --- */  
@media(max-width:480px){  
  .container { margin: 30px auto; padding: 0 15px; }
  .hero { margin-bottom: 25px; }
  .spin-pic { width: 110px; height: 110px; } 
  
  h1 { font-size: 32px; letter-spacing: 3px; } 
  .tagline { font-size: 11px; letter-spacing: 3px; }
  
  .section-title { margin: 25px 0 12px; }
  
  .link-btn { padding: 15px 16px; border-radius: 12px; } 
  .link-left { font-size: 13px; gap: 14px; }
  .link-btn i.brand-icon { font-size: 18px; width: 20px; }
}  
</style>
